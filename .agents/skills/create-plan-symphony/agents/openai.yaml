interface:
  display_name: "Create Plan Symphony"
  short_description: "Create contracted Jira-backed Symphony slice plans"
  default_prompt: "Use $create-plan-symphony to create and persist a contract-first Jira-backed Symphony implementation slice plan."
dependencies:
  tools:
    - type: "mcp"
      value: "jira"
      description: "Jira MCP server for issue reads, updates, and clarification status transitions."
      transport: "stdio"
    - type: "mcp"
      value: "filesystem"
      description: "Filesystem MCP server restricted to /workspace."
      transport: "stdio"
policy:
  allow_implicit_invocation: true
